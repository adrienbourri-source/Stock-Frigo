<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#fbfbf9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Garde-Manger">
<link rel="manifest" href="manifest.json">
<title>Le Garde-Manger</title>
<style>
  :root{
    --bg:#fbfbf9;
    --surface:#ffffff;
    --surface-2:#f6f6f3;
    --line:#ecebe6;
    --line-2:#e2e1da;
    --ink:#1d1d1f;
    --ink-2:#6e6e73;
    --ink-3:#a1a1a6;
    --accent:#c4543a;
    --accent-soft:#fbeae5;
    --hot:#d0492f;        --hot-bg:#fbeae5;
    --warn:#c98a18;       --warn-bg:#fbf2dd;
    --soon:#5a7d9a;       --soon-bg:#eaf1f6;
    --ok:#5a8f6b;         --ok-bg:#e9f2ec;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    --serif:"New York","Iowan Old Style","Palatino Linotype",Georgia,serif;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
    --shadow-lg:0 4px 12px rgba(0,0,0,.06),0 16px 48px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;
    overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding-bottom:calc(120px + env(safe-area-inset-bottom));}
  .wrap{max-width:600px;margin:0 auto;padding:0 20px;}

  header{max-width:600px;margin:0 auto;padding:calc(28px + env(safe-area-inset-top)) 20px 2px;}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--accent);margin-bottom:6px;}
  h1{font-family:var(--serif);font-weight:600;font-size:36px;line-height:1.02;letter-spacing:-.02em;}
  .status{display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:13px;color:var(--ink-2);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);transition:background .3s;}
  .dot.off{background:var(--ink-3);}

  .ledger{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:22px 0 4px;}
  .ledger .cell{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:15px 12px 13px;text-align:center;box-shadow:var(--shadow);transition:.25s;}
  .ledger .cell .num{font-size:28px;font-weight:600;line-height:1;letter-spacing:-.02em;color:var(--ink-3);transition:color .25s;}
  .ledger .cell .lab{font-size:11.5px;font-weight:500;color:var(--ink-2);margin-top:7px;}
  .ledger .cell.hot.on{background:var(--hot-bg);border-color:transparent;} .ledger .cell.hot.on .num{color:var(--hot);}
  .ledger .cell.warn.on{background:var(--warn-bg);border-color:transparent;} .ledger .cell.warn.on .num{color:var(--warn);}
  .ledger .cell.ok.on .num{color:var(--ok);}

  .tabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);
    padding:4px;border-radius:13px;margin:22px 0 18px;}
  .tab{flex:1;background:0;border:0;font:inherit;cursor:pointer;color:var(--ink-2);font-weight:600;
    font-size:14px;padding:9px;border-radius:10px;transition:.2s;}
  .tab.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .tab .b{font-size:12px;color:var(--ink-3);margin-left:5px;font-weight:600;}

  .group{margin-top:24px;}.group:first-child{margin-top:2px;}
  .group-label{font-size:13px;font-weight:600;margin:0 4px 11px;display:flex;align-items:center;gap:8px;}
  .group-label.hot{color:var(--hot);} .group-label.warn{color:var(--warn);}
  .group-label.soon{color:var(--soon);} .group-label.ok{color:var(--ok);}
  .group-label .cnt{font-size:12px;font-weight:600;color:var(--ink-3);
    background:var(--surface-2);border-radius:20px;padding:1px 9px;}

  .list{display:flex;flex-direction:column;gap:10px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:13px 15px 13px 13px;display:flex;align-items:center;gap:13px;
    box-shadow:var(--shadow);animation:in .3s cubic-bezier(.2,.7,.3,1) both;}
  @keyframes in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .thumb{width:48px;height:48px;flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center;}
  .thumb svg{width:30px;height:30px;display:block;}
  .body{flex:1;min-width:0;}
  .name{font-size:16.5px;font-weight:600;letter-spacing:-.01em;line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .phrase{font-size:13px;margin-top:3px;font-weight:500;}
  .phrase.hot{color:var(--hot);}.phrase.warn{color:var(--warn);}.phrase.soon{color:var(--soon);}.phrase.ok{color:var(--ink-2);}
  .meta{font-size:12px;color:var(--ink-3);margin-top:3px;}
  .meta .mk{font-weight:600;color:var(--ink-2);}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex:none;}
  .qty-tag{font-size:12px;font-weight:600;color:var(--ink-2);background:var(--surface-2);
    padding:3px 9px;border-radius:9px;white-space:nowrap;}
  .tick{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line-2);background:var(--surface);
    cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;font-size:15px;transition:.18s;}
  .tick:hover{border-color:var(--ok);color:var(--ok);}
  .tick:active{transform:scale(.85);background:var(--ok);color:#fff;border-color:var(--ok);}

  .hcard{display:flex;align-items:center;gap:13px;padding:11px 4px;border-bottom:1px solid var(--line);}
  .hcard .thumb{width:38px;height:38px;border-radius:11px;opacity:.55;}
  .hcard .thumb svg{width:23px;height:23px;}
  .hcard .name{font-size:15px;font-weight:500;color:var(--ink-2);}
  .mini{background:0;border:0;cursor:pointer;font-size:18px;color:var(--ink-3);padding:7px;border-radius:9px;transition:.15s;}
  .mini.undo:hover{color:var(--ok);}.mini.trash:hover{color:var(--hot);}

  .empty{text-align:center;padding:64px 28px;}
  .empty .ic{width:64px;height:64px;margin:0 auto 16px;border-radius:20px;background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;}
  .empty .ic svg{width:34px;height:34px;}
  .empty h3{font-size:17px;font-weight:600;margin-bottom:5px;}
  .empty p{color:var(--ink-2);font-size:14px;line-height:1.5;}

  .notif-bar{display:none;align-items:center;gap:12px;background:var(--accent-soft);
    border-radius:15px;padding:13px 15px;margin-bottom:18px;}
  .notif-bar.show{display:flex;}
  .notif-bar .txt{flex:1;font-size:13px;color:#7a2e1c;line-height:1.4;}.notif-bar .txt b{font-weight:600;}
  .notif-bar button{background:var(--accent);color:#fff;border:0;font:inherit;font-weight:600;
    font-size:13px;padding:9px 15px;border-radius:11px;cursor:pointer;white-space:nowrap;}
  .notif-bar .x{background:0;color:var(--accent);padding:6px;font-size:16px;}

  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(26px + env(safe-area-inset-bottom));
    background:var(--ink);color:var(--bg);border:0;font:inherit;font-weight:600;font-size:16px;
    padding:15px 30px;border-radius:100px;cursor:pointer;z-index:40;box-shadow:var(--shadow-lg);
    display:flex;align-items:center;gap:8px;transition:transform .15s;}
  .fab svg{width:19px;height:19px;}
  .fab:active{transform:translateX(-50%) scale(.95);}

  .scrim{position:fixed;inset:0;z-index:60;background:rgba(20,20,22,.32);backdrop-filter:blur(6px);
    display:none;align-items:flex-end;justify-content:center;}
  .scrim.on{display:flex;}
  .sheet{width:100%;max-width:600px;background:var(--surface);border-radius:28px 28px 0 0;
    padding:8px 22px calc(26px + env(safe-area-inset-bottom));animation:rise .3s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 -8px 40px rgba(0,0,0,.12);}
  @keyframes rise{from{transform:translateY(101%);}to{transform:none;}}
  .grab{width:38px;height:5px;background:var(--line-2);border-radius:3px;margin:10px auto 20px;}
  .sheet h2{font-family:var(--serif);font-weight:600;font-size:24px;margin-bottom:6px;letter-spacing:-.01em;}
  .sheet .preview{display:flex;align-items:center;gap:12px;margin-bottom:20px;min-height:48px;}
  .sheet .preview .thumb{width:46px;height:46px;}
  .sheet .preview .ptxt{font-size:13px;color:var(--ink-3);}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:8px;}
  input{width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);font:inherit;
    font-size:16px;padding:13px 15px;border-radius:13px;margin-bottom:18px;transition:.18s;}
  input::placeholder{color:var(--ink-3);}
  input:focus{outline:0;border-color:var(--accent);background:var(--surface);}
  input[type=date]{color-scheme:light;}
  .quick{display:flex;gap:8px;margin:-8px 0 18px;flex-wrap:wrap;}
  .estim{font-size:12.5px;color:var(--soon);background:var(--soon-bg);border-radius:10px;
    padding:8px 11px;margin-bottom:11px;display:none;}
  .estim.show{display:block;}
  .estim b{font-weight:600;}
  .chip{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);font:inherit;font-size:13px;
    font-weight:600;padding:9px 14px;border-radius:100px;cursor:pointer;transition:.15s;}
  .chip:active{transform:scale(.93);}.chip.sel{background:var(--ink);color:var(--surface);border-color:var(--ink);}
  .row{display:flex;gap:13px;}.row>div{flex:1;}
  .actions{display:flex;gap:11px;margin-top:6px;}
  .btn{flex:1;font:inherit;font-weight:600;font-size:16px;padding:15px;border-radius:14px;cursor:pointer;transition:transform .15s;}
  .btn.cancel{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);}
  .btn.save{background:var(--ink);border:0;color:var(--surface);}
  .btn:active{transform:scale(.97);}
  .footnote{text-align:center;font-size:12px;color:var(--ink-3);padding:28px 0 4px;}
  .setup{max-width:600px;margin:40px auto;padding:0 20px;}
  .setup .box{background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:22px;box-shadow:var(--shadow);}
  .setup h3{color:var(--accent);font-size:16px;margin-bottom:11px;}
  .setup p{font-size:14px;color:var(--ink-2);line-height:1.6;}
  .setup code{background:var(--surface-2);padding:2px 6px;border-radius:5px;font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Garde-manger partagĂŠ</div>
  <h1>Le Garde-Manger</h1>
  <div class="status"><span class="dot" id="dot"></span><span id="statusTxt">ConnexionâŚ</span></div>
</header>

<div class="wrap" id="app" style="display:none">
  <div class="notif-bar" id="notifBar">
    <div class="txt"><b>Activer les rappels ?</b> Une alerte par jour pour ce qui approche de sa date.</div>
    <button id="notifYes">Activer</button>
    <button class="x" id="notifNo">â</button>
  </div>
  <div class="ledger">
    <div class="cell hot" id="cellHot"><div class="num" id="nExpired">0</div><div class="lab">PĂŠrimĂŠ</div></div>
    <div class="cell warn" id="cellWarn"><div class="num" id="nSoon">0</div><div class="lab">Ă finir</div></div>
    <div class="cell ok" id="cellOk"><div class="num" id="nFresh">0</div><div class="lab">Au frais</div></div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tabStock">Stock<span class="b" id="bStock"></span></button>
    <button class="tab" id="tabHist">Historique<span class="b" id="bHist"></span></button>
  </div>
  <div id="content"></div>
  <div class="footnote" id="foot"></div>
</div>

<div class="setup" id="setup" style="display:none">
  <div class="box"><h3>Configuration Ă  terminer</h3><p>La config Firebase n'est pas renseignĂŠe dans <code>index.html</code>.</p></div>
</div>

<button class="fab" id="addBtn" style="display:none">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  Ajouter
</button>

<div class="scrim" id="scrim">
  <div class="sheet">
    <div class="grab"></div>
    <h2>Nouvel article</h2>
    <div class="preview"><span class="thumb" id="pvThumb"></span><span class="ptxt" id="pvTxt">Tape un nom, on devine l'imageâŚ</span></div>
    <label>Qu'est-ce que c'est ?</label>
    <input id="fName" placeholder="Yaourts, blanc de poulet, laitâŚ" autocomplete="off">
    <div class="row">
      <div><label>Date d'achat</label><input id="fBuy" type="date"></div>
      <div><label>QuantitĂŠ</label><input id="fQty" placeholder="ex : 4" autocomplete="off"></div>
    </div>
    <label>Date limite de consommation</label>
    <div class="estim" id="estimNote"></div>
    <div class="quick" id="quick">
      <button class="chip" data-days="2">+2 j</button>
      <button class="chip" data-days="5">+5 j</button>
      <button class="chip" data-days="7">+1 sem.</button>
      <button class="chip" data-days="14">+2 sem.</button>
      <button class="chip" data-days="30">+1 mois</button>
    </div>
    <input id="fExp" type="date">
    <div class="actions">
      <button class="btn cancel" id="cancelBtn">Annuler</button>
      <button class="btn save" id="saveBtn">Ranger</button>
    </div>
  </div>
</div>

<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyCss0aMdizpncSGGF_7cXinGyTm9RDiw2g",
  authDomain: "garde-manger-maison.firebaseapp.com",
  projectId: "garde-manger-maison",
  storageBucket: "garde-manger-maison.firebasestorage.app",
  messagingSenderId: "544506210931",
  appId: "1:544506210931:web:a3ae2ea46b101ff7169806"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const NOTIF_KEY="pantry:notif:lastDay", NOTIF_DISMISS="pantry:notif:dismissed";
let items=[], view="stock", colRef=null;
const $=id=>document.getElementById(id);

if(firebaseConfig.apiKey.includes("REMPLAC")){
  $("setup").style.display="block";$("statusTxt").textContent="Config manquante";$("dot").classList.add("off");
}else{
  const fbApp=initializeApp(firebaseConfig);
  colRef=collection(getFirestore(fbApp),"pantry");
  $("app").style.display="block";$("addBtn").style.display="flex";startSync();
}

/* ---------- ILLUSTRATIONS : detection par mot-cle ---------- */
const ICONS={
  laitage:{bg:"#eef3f8",st:"#5a7d9a",svg:'<path d="M8 8V4h8v4l1 3v8a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1v-8z"/><path d="M7.6 11h8.8"/>'},
  fromage:{bg:"#fbf4dd",st:"#c98a18",svg:'<path d="M3 13l16-7 2 4v6H3z"/><path d="M3 13l18 0"/><circle cx="8" cy="15.5" r="1"/><circle cx="13" cy="15" r=".8"/>'},
  oeuf:{bg:"#fbf4dd",st:"#c98a18",svg:'<ellipse cx="12" cy="13.5" rx="5.5" ry="7.5"/>'},
  viande:{bg:"#fbe9e9",st:"#c0504a",svg:'<path d="M14 4a5 5 0 0 1 5 5c0 2-1 3-2.5 3.5l-6.5 6.5a2.1 2.1 0 0 1-3-3l6.5-6.5C14 8 13 7 13 5a1 1 0 0 1 1-1z"/>'},
  poisson:{bg:"#eef3f8",st:"#5a7d9a",svg:'<path d="M3 12c4-5 11-5 14 0-3 5-10 5-14 0z"/><path d="M17 12c2-2 4-2 4-2s-1 2 0 4c0 0-2 0-4-2z"/><circle cx="8" cy="11" r="1"/>'},
  legume:{bg:"#e9f2ec",st:"#5a8f6b",svg:'<path d="M6 18c-1 1-2 .5-2-.5s8-10 11-11c2 2 1 4 0 5L6 18z"/><path d="M15 6l1.5-2.5M16.5 7l3-1.5M14 4.5l.5-2.5"/>'},
  fruit:{bg:"#fbe9e9",st:"#c0504a",svg:'<path d="M12 9c-1.5-1.5-5-1.5-6.5 1S5 18 8 20c2 1 3-.5 4-.5s2 1.5 4 .5c3-2 4-7 2.5-10S13.5 7.5 12 9z"/><path d="M12 9V5M12 5c1-1.5 3-1.5 4-1"/>'},
  pain:{bg:"#fbf0e0",st:"#b07a3a",svg:'<path d="M6 8c-2 0-3 1.5-3 3s1 2 2 2v5a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-5c1 0 2-.5 2-2s-1-3-3-3z"/><path d="M9 8.5l-1 5M13 8.5l-1 5"/>'},
  boisson:{bg:"#eef3f8",st:"#5a7d9a",svg:'<path d="M7 4h10v3a5 5 0 0 1-10 0z"/><path d="M12 12v6M9 20h6"/>'},
  surgele:{bg:"#e8f1f6",st:"#5a7d9a",svg:'<path d="M12 3v18M4 7l16 10M20 7L4 17"/><path d="M12 3l-2 2M12 3l2 2M12 21l-2-2M12 21l2-2"/>'},
  conserve:{bg:"#f1f0ea",st:"#888780",svg:'<rect x="6" y="5" width="12" height="15" rx="1.5"/><path d="M6 9h12M7 5l1-1h8l1 1"/>'},
  defaut:{bg:"#f1f0ea",st:"#888780",svg:'<path d="M6 8h12l-1 11a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/>'}
};
const RULES=[
  [/lait|yaourt|yogh|skyr|cr[Ă¨e]me|beurre|fromage blanc|petit suisse|fromage frais/,"laitage"],
  [/fromage|comt[ĂŠe]|camembert|brie|ch[Ă¨e]vre|emmental|gruy[Ă¨e]re|mozzar|parmesan|raclette/,"fromage"],
  [/oeuf|Ĺuf|egg/,"oeuf"],
  [/poulet|boeuf|bĹuf|porc|veau|agneau|viande|steak|saucisse|jambon|lardon|dinde|escalope|c[Ă´o]te|merguez|hachĂŠ/,"viande"],
  [/poisson|saumon|thon|cabillaud|crevette|colin|merlu|sardine|truite|moule|crabe/,"poisson"],
  [/salade|tomate|carotte|courgette|poivron|l[ĂŠe]gume|brocoli|[ĂŠe]pinard|haricot|concombre|oignon|poireau|champignon|pomme de terre|patate|chou|aubergine|courge|navet|radis/,"legume"],
  [/pomme|banane|orange|fraise|raisin|poire|p[ĂŞe]che|abricot|kiwi|mangue|ananas|melon|past[Ă¨e]que|fruit|citron|clĂŠmentine|cerise|myrtille|framboise/,"fruit"],
  [/pain|baguette|brioche|viennoiser|croissant|biscotte|toast/,"pain"],
  [/jus|soda|eau|biere|bi[Ă¨e]re|vin|coca|limonade|boisson|sirop|smoothie/,"boisson"],
  [/surgel|glace|congel/,"surgele"],
  [/conserve|bo[ĂŽi]te|haricots? blanc|ma[ĂŻi]s|petits pois/,"conserve"]
];
function catOf(name){const n=(name||"").toLowerCase();for(const[re,cat]of RULES)if(re.test(n))return cat;return"defaut";}
// durĂŠe de conservation estimĂŠe (jours) Ă  partir de l'achat, par catĂŠgorie
const SHELF={laitage:7,fromage:14,oeuf:21,viande:3,poisson:2,legume:6,fruit:7,pain:4,boisson:30,surgele:120,conserve:365,defaut:7};
function estimDays(name){return SHELF[catOf(name)]??7;}
function addDaysISO(baseISO,days){const d=baseISO?new Date(baseISO+"T00:00:00"):new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}
function iconSVG(cat){const c=ICONS[cat]||ICONS.defaut;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${c.st}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${c.svg}</svg>`;}
function thumbHTML(name){const cat=catOf(name),c=ICONS[cat]||ICONS.defaut;
  return `<span class="thumb" style="background:${c.bg}">${iconSVG(cat)}</span>`;}

/* ---------- dates ---------- */
function midnight(d=new Date()){d=new Date(d);d.setHours(0,0,0,0);return d;}
function parseD(s){if(!s)return null;const d=new Date(s+"T00:00:00");return isNaN(d)?null:d;}
function dleft(exp){const d=parseD(exp);if(!d)return null;return Math.round((d-midnight())/864e5);}
function tier(it){const d=dleft(it.exp);if(d===null)return"ok";if(d<=1)return"hot";if(d<=3)return"warn";if(d<=7)return"soon";return"ok";}
function phrase(it){const d=dleft(it.exp);
  if(d===null)return"Pas de date limite";
  if(d<0)return d===-1?"PĂŠrimĂŠ depuis hier":`PĂŠrimĂŠ depuis ${Math.abs(d)} jours`;
  if(d===0)return"Ă consommer aujourd'hui";
  if(d===1)return"Ă consommer demain";
  if(d<=6)return`Encore ${d} jours`;
  if(d<=13)return"Encore une bonne semaine";
  if(d<=20)return"Encore deux semaines";
  return"Encore du temps";}
function fmtLimit(s){const d=parseD(s);return d?"limite "+d.toLocaleDateString("fr-FR",{day:"2-digit",month:"long"}):"";}
function fmtShort(ts){return new Date(ts).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- sync ---------- */
function startSync(){
  onSnapshot(colRef, snap=>{
    items=snap.docs.map(d=>({id:d.id,...d.data()}));
    $("statusTxt").textContent="SynchronisĂŠ avec la maison";$("dot").classList.remove("off");
    render();maybeNotify();
  }, ()=>{ $("statusTxt").textContent="Hors ligne â reconnexionâŚ";$("dot").classList.add("off"); });
}
async function addItem(o){await setDoc(doc(colRef),o);}
async function patch(id,o){await updateDoc(doc(colRef,id),o);}
async function remove(id){await deleteDoc(doc(colRef,id));}

/* ---------- render ---------- */
function setLedger(stock){
  const hot=stock.filter(i=>tier(i)==="hot").length;
  const warn=stock.filter(i=>tier(i)==="warn").length;
  const fresh=stock.length-hot-warn;
  const put=(id,n,cell)=>{$(id).textContent=n;$(cell).classList.toggle("on",n>0);};
  put("nExpired",hot,"cellHot");put("nSoon",warn,"cellWarn");put("nFresh",fresh<0?0:fresh,"cellOk");
}
function cardHTML(it){
  const t=tier(it);
  const buyISO=it.buyDate||null;
  const buyTxt=buyISO?parseD(buyISO).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}):fmtShort(it.addedAt);
  const limTxt=it.exp?parseD(it.exp).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}):"â";
  return `<div class="card">
    ${thumbHTML(it.name)}
    <div class="body">
      <div class="name">${esc(it.name)}</div>
      <div class="phrase ${t}">${phrase(it)}</div>
      <div class="meta"><span class="mk">AchetĂŠ</span> ${buyTxt} &nbsp;Âˇ&nbsp; <span class="mk">Limite</span> ${limTxt}</div>
    </div>
    <div class="right">
      ${it.qty?`<span class="qty-tag">Ă${esc(it.qty)}</span>`:``}
      <button class="tick" data-done="${it.id}" title="Marquer comme consommĂŠ">â</button>
    </div></div>`;
}
function render(){
  const stock=items.filter(i=>!i.done), hist=items.filter(i=>i.done);
  setLedger(stock);
  $("bStock").textContent=stock.length||"";$("bHist").textContent=hist.length||"";
  const c=$("content");
  if(view==="stock"){
    if(!stock.length){
      c.innerHTML=`<div class="empty"><div class="ic">${iconSVG("defaut")}</div>
        <h3>Rien au frais</h3><p>Touche ÂŤ Ajouter Âť pour ranger ce qu'il y a dans le frigo.</p></div>`;
      $("foot").textContent="";return;
    }
    stock.sort((a,b)=>{const x=dleft(a.exp),y=dleft(b.exp);if(x===null)return 1;if(y===null)return -1;return x-y;});
    const buckets=[["hot","Ă manger en prioritĂŠ"],["warn","Ă finir bientĂ´t"],["soon","Cette semaine"],["ok","Au frais"]];
    let html="";
    for(const[t,label]of buckets){
      const rows=stock.filter(i=>tier(i)===t);if(!rows.length)continue;
      html+=`<div class="group"><div class="group-label ${t}">${label}<span class="cnt">${rows.length}</span></div><div class="list">`;
      for(const it of rows)html+=cardHTML(it);
      html+="</div></div>";
    }
    c.innerHTML=html;
    $("foot").textContent=`${stock.length} article${stock.length>1?"s":""} dans le garde-manger`;
  }else{
    if(!hist.length){
      c.innerHTML=`<div class="empty"><div class="ic">${iconSVG("defaut")}</div>
        <h3>Historique vide</h3><p>Les articles consommĂŠs s'archivent ici.</p></div>`;
      $("foot").textContent="";return;
    }
    hist.sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
    let html="<div>";
    for(const it of hist)html+=`<div class="hcard">${thumbHTML(it.name)}
      <div class="body"><div class="name">${esc(it.name)}</div>
      <div class="meta">consommĂŠ le ${fmtShort(it.doneAt)}</div></div>
      <button class="mini undo" data-undo="${it.id}" title="Remettre dans le stock">âş</button>
      <button class="mini trash" data-del="${it.id}" title="Supprimer dĂŠfinitivement">â</button></div>`;
    html+="</div>";c.innerHTML=html;
    $("foot").textContent=`${hist.length} article${hist.length>1?"s":""} archivĂŠ${hist.length>1?"s":""}`;
  }
}

/* ---------- actions ---------- */
$("content").addEventListener("click",e=>{
  const done=e.target.closest("[data-done]"),undo=e.target.closest("[data-undo]"),del=e.target.closest("[data-del]");
  if(done){if(navigator.vibrate)navigator.vibrate(12);patch(done.dataset.done,{done:true,doneAt:Date.now()});}
  if(undo)patch(undo.dataset.undo,{done:false,doneAt:null});
  if(del&&confirm("Supprimer dĂŠfinitivement de l'historique ?"))remove(del.dataset.del);
});
$("tabStock").onclick=()=>{view="stock";$("tabStock").classList.add("on");$("tabHist").classList.remove("on");render();};
$("tabHist").onclick=()=>{view="hist";$("tabHist").classList.add("on");$("tabStock").classList.remove("on");render();};

/* ---------- sheet ---------- */
let limitTouched=false; // l'utilisateur a-t-il fixĂŠ la limite manuellement ?
function refreshPreview(){
  const n=$("fName").value.trim();
  $("pvThumb").outerHTML=thumbHTML(n).replace('class="thumb"','class="thumb" id="pvThumb"');
  $("pvTxt").textContent=n?`CatĂŠgorie : ${catOf(n)}`:"Tape un nom, on devine l'imageâŚ";
  applyEstimate();
}
function applyEstimate(){
  const n=$("fName").value.trim();
  const note=$("estimNote");
  if(!n){note.classList.remove("show");return;}
  const days=estimDays(n);
  note.innerHTML=`Conservation estimĂŠe pour ce type : <b>${days} jour${days>1?"s":""}</b>. Modifiable ci-dessous.`;
  note.classList.add("show");
  if(!limitTouched){ // prĂŠ-remplit la limite depuis la date d'achat + estimation
    $("fExp").value=addDaysISO($("fBuy").value||null,days);
  }
}
function openSheet(){
  $("fName").value="";$("fQty").value="";$("fExp").value="";
  $("fBuy").value=new Date().toISOString().slice(0,10); // achat = aujourd'hui par dĂŠfaut
  limitTouched=false;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("sel"));
  $("estimNote").classList.remove("show");
  refreshPreview();
  $("scrim").classList.add("on");setTimeout(()=>$("fName").focus(),130);
}
function closeSheet(){$("scrim").classList.remove("on");}
$("addBtn").onclick=openSheet;$("cancelBtn").onclick=closeSheet;
$("fName").addEventListener("input",refreshPreview);
$("fBuy").addEventListener("input",applyEstimate); // changer l'achat recalcule l'estimation
$("scrim").addEventListener("click",e=>{if(e.target===$("scrim"))closeSheet();});
document.querySelectorAll(".chip").forEach(chip=>{chip.onclick=()=>{
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("sel"));chip.classList.add("sel");
  limitTouched=true;
  $("fExp").value=addDaysISO($("fBuy").value||null,+chip.dataset.days);};});
$("fExp").addEventListener("input",()=>{limitTouched=true;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("sel"));});
$("saveBtn").onclick=()=>{const name=$("fName").value.trim();if(!name){$("fName").focus();return;}
  const buy=$("fBuy").value||new Date().toISOString().slice(0,10);
  addItem({name,qty:$("fQty").value.trim(),exp:$("fExp").value||"",buyDate:buy,addedAt:Date.now(),done:false});
  closeSheet();view="stock";$("tabStock").classList.add("on");$("tabHist").classList.remove("on");};

/* ---------- notifications ---------- */
const notifOK=()=>"Notification" in window;
if(notifOK()&&Notification.permission==="default"&&localStorage.getItem(NOTIF_DISMISS)!=="1")$("notifBar").classList.add("show");
$("notifYes")?.addEventListener("click",async()=>{try{const p=await Notification.requestPermission();
  $("notifBar").classList.remove("show");
  if(p==="granted"){try{new Notification("Rappels activĂŠs",{body:"Une alerte par jour pour ce qui approche de sa date."});}catch(e){}maybeNotify(true);}
}catch(e){$("notifBar").classList.remove("show");}});
$("notifNo")?.addEventListener("click",()=>{localStorage.setItem(NOTIF_DISMISS,"1");$("notifBar").classList.remove("show");});
function maybeNotify(force){
  if(!notifOK()||Notification.permission!=="granted")return;
  const k=midnight().toISOString().slice(0,10);
  if(!force&&localStorage.getItem(NOTIF_KEY)===k)return;
  const urgent=items.filter(i=>!i.done&&(tier(i)==="hot"||tier(i)==="warn"));
  if(!urgent.length)return;
  localStorage.setItem(NOTIF_KEY,k);
  const names=urgent.slice(0,3).map(i=>i.name).join(", ")+(urgent.length>3?` +${urgent.length-3}`:"");
  const exp=urgent.filter(i=>dleft(i.exp)<0).length;
  const title=exp?`${exp} article${exp>1?"s":""} pĂŠrimĂŠ${exp>1?"s":""}`:`${urgent.length} Ă  consommer vite`;
  try{new Notification(title,{body:names,tag:"pantry-daily"});}catch(e){}
}

if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
